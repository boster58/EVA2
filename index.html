<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Usuarios</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="d-flex">

  <!-- SIDEBAR -->
  <div class="sidebar p-3">
    <h5 class="text-white text-center">Sistema</h5>
    <hr class="text-white">

    <button class="btn btn-primary btn-sm w-100 mb-2 sidebar-btn" onclick="mostrarUsuarios()">
      👥 Usuarios
    </button>

    <button class="btn btn-danger btn-sm w-100 sidebar-btn" onclick="mostrarEliminados()">
      🗑 Eliminados
    </button>
  </div>

  <div class="content p-4 w-100">

    <h2 class="mb-4">Gestión de Usuarios</h2>

    <div id="mensaje"></div>

    <div class="row mb-4">

      <div class="col-md-6">
        <div class="card shadow-sm p-3 mb-3 bg-success text-white text-center">
          <h6>✅ Activos</h6>
          <h3 id="activos">0</h3>
        </div>

        <div class="card shadow-sm p-3 bg-danger text-white text-center">
          <h6>❌ Inactivos</h6>
          <h3 id="inactivos">0</h3>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card shadow-sm p-4 text-center">
          <h5>🕒 Fecha y Hora</h5>
          <h4 id="fechaHora"></h4>
        </div>
      </div>

    </div>

    <div class="card mb-4 shadow-sm">
      <div class="card-header bg-primary text-white">Registrar Usuario</div>

      <div class="card-body">
        <div class="row g-2">
          <div class="col-md-3">
            <input type="text" id="nombre" class="form-control" placeholder="Nombre">
          </div>
          <div class="col-md-3">
            <input type="number" id="edad" class="form-control" placeholder="Edad">
          </div>
          <div class="col-md-3">
            <select id="rol" class="form-select">
              <option value="">Rol</option>
              <option value="Administrador">Administrador</option>
              <option value="Usuario">Usuario</option>
            </select>
          </div>
          <div class="col-md-3">
            <button class="btn btn-success btn-sm w-100" onclick="guardarUsuario()">Guardar</button>
          </div>
        </div>
      </div>
    </div>

    <div class="row mb-3">
      <div class="col-md-4">
        <input type="text" class="form-control form-control-sm" placeholder="Buscar..." onkeyup="buscarUsuario(this.value)">
      </div>

      <div class="col-md-4">
        <select class="form-select form-select-sm" onchange="filtrarUsuarios(this.value)">
          <option value="todos">Todos</option>
          <option value="Administrador">Administradores</option>
          <option value="Usuario">Usuarios</option>
        </select>
      </div>

      <div class="col-md-4 text-end">
        <button class="btn btn-outline-secondary btn-sm" onclick="ordenarPorEdad()">Ordenar Edad</button>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-header bg-dark text-white">Usuarios</div>

      <div class="card-body table-responsive">
        <table class="table table-hover table-sm text-center align-middle">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Edad</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Acciones</th>
              <th>Fecha Eliminación</th>
            </tr>
          </thead>
          <tbody id="listaUsuarios"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
